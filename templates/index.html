<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axiom AI — Job Market Analyzer</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #0d1117; 
            color: #e6edf3; 
            font-family: 'Segoe UI', sans-serif;
        }
        header {
            background: #161b22;
            padding: 20px 40px;
            border-bottom: 1px solid #30363d;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        header h1 { 
            font-size: 24px; 
            color: #58a6ff;
        }
        header p { color: #8b949e; font-size: 14px; }
        .container { padding: 40px; }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }
        .stat-card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 24px;
            text-align: center;
        }
        .stat-card h2 { 
            font-size: 36px; 
            color: #58a6ff;
            margin-bottom: 8px;
        }
        .stat-card p { color: #8b949e; font-size: 14px; }
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }
        .chart-card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 24px;
        }
        .chart-card h3 {
            color: #58a6ff;
            margin-bottom: 20px;
            font-size: 16px;
        }
        .search-box {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 40px;
        }
        .search-box h3 { color: #58a6ff; margin-bottom: 15px; }
        .search-box input {
            background: #0d1117;
            border: 1px solid #30363d;
            color: #e6edf3;
            padding: 10px 15px;
            border-radius: 8px;
            width: 300px;
            font-size: 14px;
        }
        .search-box button {
            background: #58a6ff;
            color: #0d1117;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            margin-left: 10px;
        }
        .search-results { margin-top: 20px; }
        .job-card {
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
        }
        .job-card h4 { color: #58a6ff; margin-bottom: 5px; }
        .job-card p { color: #8b949e; font-size: 13px; }
        footer {
            text-align: center;
            padding: 20px;
            color: #8b949e;
            font-size: 13px;
            border-top: 1px solid #30363d;
        }
    </style>
</head>
<body>

<header>
    <div>
        <h1>⚡ Axiom AI</h1>
        <p>Real-time Job Market Analyzer</p>
    </div>
</header>

<div class="container">

    <!-- Stats -->
    <div class="stats-grid">
        <div class="stat-card">
            <h2 id="total-jobs">...</h2>
            <p>Total Jobs Analyzed</p>
        </div>
        <div class="stat-card">
            <h2 id="top-skill">...</h2>
            <p>Most In-Demand Skill</p>
        </div>
        <div class="stat-card">
            <h2 id="total-locations">...</h2>
            <p>Locations</p>
        </div>
        <div class="stat-card">
            <h2 id="total-companies">...</h2>
            <p>Companies Hiring</p>
        </div>
    </div>

    <!-- Charts -->
    <div class="charts-grid">
        <div class="chart-card">
            <h3>🔥 Top Skills in Demand</h3>
            <canvas id="skillsChart"></canvas>
        </div>
        <div class="chart-card">
            <h3>📍 Top Locations</h3>
            <canvas id="locationsChart"></canvas>
        </div>
    </div>

    <!-- Search -->
    <div class="search-box">
        <h3>🔍 Search Jobs</h3>
        <input type="text" id="search-input" placeholder="e.g. python, ai, developer..." />
        <button onclick="searchJobs()">Search</button>
        <div class="search-results" id="search-results"></div>
    </div>

</div>

<footer>
    Built by Mostafa Raihan — AI & Data Engineering Student @ SAMK
</footer>

<script>
    // Fetch and display stats
    async function loadDashboard() {
        // Total jobs
        const countRes = await fetch('/jobs/count')
        const countData = await countRes.json()
        document.getElementById('total-jobs').textContent = countData.total_jobs

        // Skills
        const skillsRes = await fetch('/jobs/skills')
        const skillsData = await skillsRes.json()
        const skills = skillsData.skills_in_demand
        const skillLabels = Object.keys(skills).slice(0, 8)
        const skillValues = Object.values(skills).slice(0, 8)
        document.getElementById('top-skill').textContent = skillLabels[0].toUpperCase()

        new Chart(document.getElementById('skillsChart'), {
            type: 'bar',
            data: {
                labels: skillLabels,
                datasets: [{
                    label: 'Jobs mentioning skill',
                    data: skillValues,
                    backgroundColor: '#58a6ff',
                    borderRadius: 6
                }]
            },
            options: {
                plugins: { legend: { display: false } },
                scales: {
                    y: { ticks: { color: '#8b949e' }, grid: { color: '#30363d' } },
                    x: { ticks: { color: '#8b949e' }, grid: { color: '#30363d' } }
                }
            }
        })

        // Locations
        const locRes = await fetch('/jobs/locations')
        const locData = await locRes.json()
        const locations = locData.locations
        const locLabels = Object.keys(locations).slice(0, 8)
        const locValues = Object.values(locations).slice(0, 8)
        document.getElementById('total-locations').textContent = Object.keys(locations).length

        new Chart(document.getElementById('locationsChart'), {
            type: 'doughnut',
            data: {
                labels: locLabels,
                datasets: [{
                    data: locValues,
                    backgroundColor: ['#58a6ff','#3fb950','#d29922','#f85149','#bc8cff','#79c0ff','#56d364','#ffa657'],
                }]
            },
            options: {
                plugins: { legend: { labels: { color: '#8b949e' } } }
            }
        })

        // Companies
        const compRes = await fetch('/jobs/companies')
        const compData = await compRes.json()
        document.getElementById('total-companies').textContent = Object.keys(compData.top_companies).length
    }

    // Search jobs
    async function searchJobs() {
        const keyword = document.getElementById('search-input').value
        if (!keyword) return
        const res = await fetch(`/jobs/search/${keyword}`)
        const data = await res.json()
        const container = document.getElementById('search-results')
        if (data.total === 0) {
            container.innerHTML = '<p style="color:#8b949e">No jobs found</p>'
            return
        }
        container.innerHTML = `<p style="color:#3fb950;margin-bottom:10px">Found ${data.total} jobs</p>`
        data.jobs.slice(0, 5).forEach(job => {
            container.innerHTML += `
                <div class="job-card">
                    <h4>${job.title}</h4>
                    <p>${job.company} — ${job.location}</p>
                </div>`
        })
    }

    loadDashboard()
</script>

</body>
</html>
